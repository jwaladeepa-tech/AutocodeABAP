name: ABAP CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  abaplint:
    name: Abaplint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install abaplint
        run: npm install -g @abaplint/cli

      - name: Run abaplint
        run: abaplint .
        continue-on-error: false

      - name: Upload abaplint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abaplint-results
          path: abaplint.json
          retention-days: 30
